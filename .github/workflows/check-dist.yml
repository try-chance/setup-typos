name: Check dist

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check_dist:
    name: Check dist/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Remove dist directory
        run: rm -rf dist

      - run: npm ci

      - run: npm run package

      - name: Compare dist directory
        id: diff
        run: |
          if [ ! -d dist ]; then
            echo "Expected dist directory does not exist."
            echo "stale=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git diff --ignore-space-at-eol --text --quiet -- dist; then
            echo "stale=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Detected uncommitted dist changes:"
            git diff --ignore-space-at-eol --text -- dist
            echo "Diff summary:"
            git diff --stat -- dist
            echo "stale=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Explain stale dist
        if: steps.diff.outputs.stale == 'true'
        run: |
          {
            echo "::error title=dist is stale::Generated dist/ does not match the committed dist/ files."
            echo ""
            echo "This repository commits the bundled GitHub Action in dist/."
            echo "To fix this PR, regenerate and commit the packaged action:"
            echo ""
            echo "  npm ci"
            echo "  npm run package"
            echo "  git add dist/index.js"
            echo "  git commit -m \"Update packaged action\""
            echo ""
            echo "The generated dist/ directory will also be uploaded as the dist-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT} workflow artifact."
          } | tee -a "${GITHUB_STEP_SUMMARY}"

      - name: Upload generated dist
        if: steps.diff.outputs.stale == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist
          if-no-files-found: error

      - name: Fail if dist is stale
        if: steps.diff.outputs.stale == 'true'
        run: exit 1
